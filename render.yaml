# Optional: deploy from Render Dashboard → New → Blueprint
services:
  - type: web
    name: db-opt-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://ai-powered-database-query-optimiser-1.onrender.com,http://localhost:5173,http://127.0.0.1:5173
      - key: DATABASE_URL
        fromDatabase:
          name: db-opt-db
          property: internalConnectionString

  - type: web
    name: db-opt-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://ai-powered-database-query-optimiser.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: db-opt-db
    databaseName: data
    plan: free
