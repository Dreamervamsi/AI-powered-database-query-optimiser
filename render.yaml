# Optional: deploy from Render Dashboard → New → Blueprint
services:
  - type: web
    name: db-opt-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: http://localhost:5173
      - key: DATABASE_URL
        fromDatabase:
          name: db-opt-db
          property: internalConnectionString

databases:
  - name: db-opt-db
    databaseName: data
    plan: free
